<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sahara Dreams | Moroccan Tours & Desert Expeditions</title>
    <meta name="description" content="Discover the magic of Morocco with Sahara Dreams. Experience authentic desert expeditions, guided tours of Marrakech, Chefchaouen, and the Atlas Mountains. Book your unforgettable Moroccan adventure today." />
    <meta name="keywords" content="Morocco tours, Sahara desert, Marrakech tours, Moroccan travel, desert expedition, Atlas mountains, Chefchaouen, Morocco vacation" />
    <meta name="author" content="Sahara Dreams" />

    <link rel="apple-touch-icon" sizes="180x180" href="src/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="src/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="src/assets/favicon/favicon-16x16.png">
    <link rel="icon" href="src/assets/favicon/favicon.ico">
    <link rel="manifest" href="src/assets/favicon/site.webmanifest">

    <link rel="canonical" href="https://saharadreams.com" />

    <meta property="og:title" content="Sahara Dreams | Moroccan Tours & Desert Expeditions" />
    <meta property="og:description" content="Experience authentic Moroccan adventures. Desert expeditions, city tours, and mountain treks crafted with local expertise." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="https://saharadreams.com" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sahara Dreams | Moroccan Tours" />
    <meta name="twitter:description" content="Experience authentic Moroccan adventures. Desert expeditions, city tours, and mountain treks." />
    <meta name="twitter:image" content="" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Sahara Dreams",
      "description": "Moroccan Tours & Desert Expeditions",
      "url": "https://saharadreams.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "42 Rue Mouassine, Medina",
        "addressLocality": "Marrakech",
        "addressCountry": "MA"
      },
      "telephone": "+212524123456",
      "email": "hello@saharadreams.com"
    }
    </script>
  </head>

  <body>
    <!-- Netlify form skeletons for build-time detection -->
    <form name="booking" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="booking" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="date" />
      <input name="guests" />
      <input name="title" />
      <input name="subject" />
      <input name="tour-title" />
      <input name="tour-price" />
      <textarea name="message"></textarea>
    </form>

    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <textarea name="message"></textarea>
    </form>

    <form name="custom-trip" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="custom-trip" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="startDate" />
      <input name="duration" />
      <input name="travelers" />
      <input name="budget" />
      <input name="accommodation" />
      <input name="destinations" />
      <input name="interests" />
      <textarea name="message"></textarea>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

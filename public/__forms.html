<!DOCTYPE html>
<html>
  <body>
    <!-- Booking form skeleton — for Netlify build-time detection only -->
    <form name="booking" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="booking" />
      <input type="text" name="title" />
      <input type="text" name="subject" />
      <input type="hidden" name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="date" />
      <input name="guests" />
      <input name="tour-title" />
      <input name="tour-price" />
      <textarea name="message"></textarea>
    </form>

    <!-- Contact form skeleton — for Netlify build-time detection only -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <textarea name="message"></textarea>
    </form>

    <!-- Custom trip form skeleton — for Netlify build-time detection only -->
    <form name="custom-trip" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="custom-trip" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="startDate" />
      <input name="duration" />
      <input name="travelers" />
      <input name="budget" />
      <input name="accommodation" />
      <input name="destinations" />
      <input name="interests" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
